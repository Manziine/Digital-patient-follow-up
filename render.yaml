services:
  - type: web
    name: dpfcss-backend
    env: node
    plan: free
    rootDir: dpfcss-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false  # e.g. https://dpfcss-frontend.vercel.app

  - type: web
    name: dpfcss-frontend
    env: static
    rootDir: dpfcss-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false  # e.g. https://dpfcss-backend.onrender.com/api
